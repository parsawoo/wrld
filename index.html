<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parsawoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      cursor: none;
      font-family: 'DM Mono', monospace;
      color: #f0ede6;
    }

    #bg {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.5) saturate(0.75);
      z-index: 0;
    }

    #spotlight {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    #cursor {
      position: fixed;
      width: 7px; height: 7px;
      background: #f0ede6;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: difference;
    }

    /* ── 상단 날짜/시간 ── */
    #datetime {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(240,237,230,0.5);
      z-index: 3;
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn .8s .3s forwards;
    }

    /* ── 중앙 버튼 두 개 ── */
    .scene {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .btn {
      display: block;
      width: 220px;
      padding: 14px 0;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: .25em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: none;
      transition: color .2s, border-color .2s, background .2s;
      opacity: 0;
      animation: fadeIn .8s forwards;
    }

    .btn-latest {
      background: #f0ede6;
      color: #0a0a0a;
      border: 1px solid #f0ede6;
      animation-delay: .5s;
    }
    .btn-latest:hover {
      background: transparent;
      color: #f0ede6;
    }

    .btn-old {
      background: transparent;
      color: rgba(240,237,230,0.45);
      border: 1px solid rgba(240,237,230,0.2);
      animation-delay: .65s;
    }
    .btn-old:hover {
      color: #f0ede6;
      border-color: rgba(240,237,230,0.6);
    }

    /* ── 하단 ── */
    #credit {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: rgba(240,237,230,0.25);
      z-index: 3;
      white-space: nowrap;
      opacity: 0;
      animation: fadeIn .8s .9s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<div id="bg"></div>
<canvas id="spotlight"></canvas>
<div id="cursor"></div>

<div id="datetime"></div>

<div class="scene">
  <a class="btn btn-latest" href="latest.html">Latest</a>
  <a class="btn btn-old" href="archive.html">Old</a>
</div>

<div id="credit">Curated by Parsawoo</div>

<script>
  let mx = -999, my = -999;

  const bgEl     = document.getElementById('bg');
  const canvas   = document.getElementById('spotlight');
  const ctx      = canvas.getContext('2d');
  const cursorEl = document.getElementById('cursor');
  const dtEl     = document.getElementById('datetime');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my + 'px';
  });

  function drawSpotlight() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const g = ctx.createRadialGradient(mx, my, 0, mx, my, 360);
    g.addColorStop(0,    'rgba(5,5,5,0)');
    g.addColorStop(0.28, 'rgba(5,5,5,0)');
    g.addColorStop(0.62, 'rgba(5,5,5,0.75)');
    g.addColorStop(1,    'rgba(5,5,5,0.97)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    requestAnimationFrame(drawSpotlight);
  }
  drawSpotlight();

  // 랜덤 배경
  if (typeof IMAGES !== 'undefined' && IMAGES.length > 0) {
    const pick = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    bgEl.style.backgroundImage = `url('${pick}')`;
  }

  // 날짜 + 시간
  function updateTime() {
    const now  = new Date();
    const date = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    dtEl.textContent = `${date}  —  ${time}`;
  }
  setInterval(updateTime, 1000);
  updateTime();
</script>
</body>
</html>
