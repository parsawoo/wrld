<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parsawoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Iso&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700&family=Rubik+Iso&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #080808;
      cursor: none;
    }

    /* ── WebGL 캔버스 (배경 + 왜곡) ── */
    #glcanvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: difference;
    }

/* ── 상단 (PC/모바일 공용 및 PC 확대) ── */
    #header {
      position: fixed;
      top: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      z-index: 3;
      opacity: 0;
      animation: fadeIn .8s .3s forwards;
      text-align: center; /* 중앙 정렬 보장 */
      width: 100%; /* 모바일 대응 */
    }

    #datetime, #credit {
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.8), 0 2px 4px rgba(0,0,0,0.9), 0 4px 8px rgba(0,0,0,1);
      white-space: nowrap;
    }

    /* 기본(모바일) 사이즈 */
    #datetime { font-family: 'Archivo', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: -0.02em; }
    #credit { font-family: 'Archivo', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: -0.01em; opacity: 0.6; }

    /* ── 하단 버튼 영역 ── */
    #footer {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem; /* 모바일에서 간격 최적화 */
      z-index: 3;
      opacity: 0;
      animation: fadeIn .8s .6s forwards;
      width: 100%; /* 부모 너비 확보로 중앙 정렬 유지 */
    }

    .btn {
      display: block;
      text-decoration: none;
      cursor: none;
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      text-align: center;
      width: 100%; /* 클릭 영역 확보 */
    }

    .btn span {
      display: inline-block; /* 줄바꿈 방지 및 회전축 고정 */
      font-family: 'Rubik Iso', system-ui;
      font-size: 8.5vw; /* 모바일에서 화면 너비에 맞춰 자동 조절 (줄바꿈 방지) */
      max-size: 34px; /* 너무 커지지 않게 제한 */
      letter-spacing: -0.06em;
      color: #fff;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 4px 8px rgba(0,0,0,0.9), 0 8px 16px rgba(0,0,0,1);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap; /* 절대 줄바꿈 금지 */
    }

    /* ── PC 환경 (데스크탑 1.5배 확대) ── */
    @media (min-width: 768px) {
      #datetime { font-size: 21px; } /* 14px * 1.5 */
      #credit { font-size: 16px; }   /* 11px * 1.5 */
      #header { gap: 0.5rem; }

      #footer { gap: 3rem; bottom: 6rem; }
      .btn span { font-size: 52px; } /* 34px * 1.5 */
    }

    /* ── 애니메이션 및 호버 효과 유지 ── */
    .btn-primary { transform: rotate(-4deg); }
    .btn-primary:hover span {
      opacity: 0.6; transform: scale(1.1) rotate(-6deg);
      filter: blur(12px) brightness(2.5); text-shadow: 0 0 25px #fff;
    }

    .btn-secondary { transform: rotate(5deg); }
    .btn-secondary:hover span {
      opacity: 0.5; transform: scale(1.1) rotate(8deg);
      filter: blur(10px) brightness(0); text-shadow: none;
    }

    .btn:active { transform: scale(0.95); }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<canvas id="glcanvas"></canvas>
<div id="cursor"></div>

<div id="header">
  <div id="datetime"></div>
  <div id="credit">Curated by Parsawoo</div>
</div>

<div id="footer">
  <a class="btn btn-primary" href="latest.html"><span>Weekly Letter</span></a>
  <a class="btn btn-secondary" href="hourly.html"><span>Hourly Report</span></a>
</div>
  
<script>
  /* ── 커서 ── */
  let mx = window.innerWidth / 2;
  let my = window.innerHeight / 2;
  const cursorEl = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my + 'px';
  });

  /* ── 시간 ── */
  const dtEl = document.getElementById('datetime');
  function updateTime() {
    const now  = new Date();
    const date = now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    const time = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    dtEl.textContent = `${date}  —  ${time}`;
  }
  setInterval(updateTime, 1000);
  updateTime();

  /* ── WebGL ripple ── */
  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  const vsSource = `
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main() {
      v_uv = a_pos * 0.5 + 0.5;
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  const fsSource = `
   precision mediump float;
  uniform sampler2D u_tex;
  uniform vec2 u_res;      // 화면 해상도
  uniform vec2 u_imgRes;   // 이미지 실제 해상도
  uniform vec2 u_mouse;
  uniform float u_time;
  varying vec2 v_uv;

  void main() {
    // 1. 비율 유지(Cover) 계산
    vec2 s = u_res;
    vec2 i = u_imgRes;
    float rs = s.x / s.y;
    float ri = i.x / i.y;
    vec2 newUv = rs < ri ? vec2(i.x * s.y / i.y, s.y) : vec2(s.x, i.y * s.x / i.x);
    vec2 offset = (newUv - s) / 2.0 / newUv;
    vec2 uv = v_uv * (s / newUv) + offset;
    
    uv.y = 1.0 - uv.y; // Y축 반전

    // 2. 마우스 물결 효과
    vec2 mouse = vec2(u_mouse.x / u_res.x, u_mouse.y / u_res.y);
    float dist = distance(v_uv, mouse);
    float ripple = sin(dist * 28.0 - u_time * 5.0) * exp(-dist * 7.0) * 0.018;
    vec2 dir = normalize(v_uv - mouse + vec2(0.0001));
    uv += dir * ripple;

    vec4 texColor = texture2D(u_tex, uv);
    float bleach = abs(ripple) * 12.0 * exp(-dist * 10.0);
    gl_FragColor = vec4(texColor.rgb + vec3(bleach), texColor.a);
  }
  `;

  const uImgRes = gl.getUniformLocation(prog, 'u_imgRes');
  let imgActualRes = [1, 1];

  function loadBg() {
    if (typeof IMAGES === 'undefined' || IMAGES.length === 0) return;
    const src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      imgActualRes = [img.width, img.height]; // 실제 이미지 크기 저장
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    };
    img.src = src;
  }

  function draw(t) {
    smx += (mx - smx) * 0.08;
    smy += (my - smy) * 0.08;

    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform2f(uImgRes, imgActualRes[0], imgActualRes[1]); // 이미지 비율 전달
    gl.uniform2f(uMouse, smx, smy);
    gl.uniform1f(uTime, t * 0.001);
    gl.uniform1i(uTex, 0);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }

  function compileShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compileShader(vsSource, gl.VERTEX_SHADER));
  gl.attachShader(prog, compileShader(fsSource, gl.FRAGMENT_SHADER));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  const buf  = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uTex   = gl.getUniformLocation(prog, 'u_tex');
  const uRes   = gl.getUniformLocation(prog, 'u_res');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');
  const uTime  = gl.getUniformLocation(prog, 'u_time');

  /* 배경 텍스처 로드 */
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);

  // 이미지 로드 전 임시 1px
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0,
    gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([10,10,10,255]));

  function loadBg() {
    if (typeof IMAGES === 'undefined' || IMAGES.length === 0) return;
    const src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    };
    img.src = src;
  }
  loadBg();

  /* 마우스 스무딩 */
  let smx = mx, smy = my;

  function draw(t) {
    smx += (mx - smx) * 0.08;
    smy += (my - smy) * 0.08;

    gl.uniform2f(uRes,   canvas.width, canvas.height);
    gl.uniform2f(uMouse, smx, smy);
    gl.uniform1f(uTime,  t * 0.001);
    gl.uniform1i(uTex,   0);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
</script>
</body>
</html>
