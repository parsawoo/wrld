<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parsawoo</title>

<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#080808;
  font-family:'Archivo', sans-serif;
  cursor:none;
}

/* WebGL */
#glcanvas {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* Cursor */
#cursor {
  position:fixed;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#fff;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:999;
  mix-blend-mode:difference;
}

/* Header */
#header {
  position:fixed;
  top:2rem;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.4rem;
  z-index:3;
  opacity:0;
  animation:fadeIn .8s .3s forwards;
}

#datetime, #credit {
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#fff;
  mix-blend-mode:difference;
}

#credit { font-size:10px; }

/* Footer buttons */
#footer {
  position:fixed;
  bottom:4rem;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:2.5rem;
  z-index:3;
  opacity:0;
  animation:fadeIn .8s .6s forwards;
}

.oval-btn {
  padding:14px 36px;
  border-radius:999px;
  border:1px solid #fff;
  color:#fff;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  text-decoration:none;
  mix-blend-mode:difference;
  backdrop-filter: blur(6px);
  transition:all .35s cubic-bezier(.23,1,.32,1);
}

.oval-btn:hover {
  background:rgba(255,255,255,0.9);
  color:#000;
  mix-blend-mode:normal;
  transform:translateY(-2px);
}

/* Fade */
@keyframes fadeIn {
  to { opacity:1; }
}
</style>
</head>

<body>

<canvas id="glcanvas"></canvas>
<div id="cursor"></div>

<div id="header">
  <div id="datetime"></div>
  <div id="credit">Curated by Parsawoo</div>
</div>

<div id="footer">
  <a class="oval-btn" href="latest.html">Weekly Letter</a>
  <a class="oval-btn" href="hourly.html">Hourly Report</a>
</div>

<script>
/* Cursor */
let mx = window.innerWidth/2, my = window.innerHeight/2;
const cursor = document.getElementById('cursor');

document.addEventListener('mousemove', e=>{
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px';
  cursor.style.top=my+'px';
});

/* Time */
const dtEl = document.getElementById('datetime');
function updateTime(){
  const now=new Date();
  dtEl.textContent =
    now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) +
    ' — ' +
    now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateTime,1000);
updateTime();

/* WebGL */
const canvas=document.getElementById('glcanvas');
const gl=canvas.getContext('webgl');

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  gl.viewport(0,0,canvas.width,canvas.height);
}
resize();
window.addEventListener('resize',resize);

const vs=`
attribute vec2 a;
varying vec2 v;
void main(){
  v=a*.5+.5;
  gl_Position=vec4(a,0,1);
}
`;

const fs=`
precision mediump float;

uniform sampler2D u_tex;
uniform vec2 u_res;
uniform vec2 u_mouse;
uniform float u_time;

varying vec2 v;

void main(){
  vec2 uv=v;
  uv.y=1.-uv.y;

  /* cover 처리 */
  vec2 ratio = u_res / min(u_res.x, u_res.y);
  uv = (uv - 0.5) * ratio + 0.5;

  vec2 m=vec2(u_mouse.x/u_res.x,1.-u_mouse.y/u_res.y);

  float d=distance(uv,m);
  float ripple = sin(d*30.-u_time*4.) * exp(-d*6.) * 0.02;

  uv += normalize(uv-m+vec2(0.0001)) * ripple;

  gl_FragColor=texture2D(u_tex,uv);
}
`;

function compile(src,type){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  return s;
}

const prog=gl.createProgram();
gl.attachShader(prog,compile(vs,gl.VERTEX_SHADER));
gl.attachShader(prog,compile(fs,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const loc=gl.getAttribLocation(prog,'a');
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

const uRes=gl.getUniformLocation(prog,'u_res');
const uMouse=gl.getUniformLocation(prog,'u_mouse');
const uTime=gl.getUniformLocation(prog,'u_time');

const tex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,tex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([10,10,10,255]));

/* 이미지 로드 */
if (typeof IMAGES !== 'undefined') {
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    gl.bindTexture(gl.TEXTURE_2D,tex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  };
  img.src=IMAGES[Math.floor(Math.random()*IMAGES.length)];
}

let smx=mx, smy=my;

function draw(t){
  smx+=(mx-smx)*0.08;
  smy+=(my-smy)*0.08;

  gl.uniform2f(uRes,canvas.width,canvas.height);
  gl.uniform2f(uMouse,smx,smy);
  gl.uniform1f(uTime,t*0.001);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

</script>

</body>
</html>
