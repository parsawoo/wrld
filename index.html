<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parsawoo | Future Strategy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Iso&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='30' r='18' fill='%23FF8A00'/%3E%3Ccircle cx='30' cy='65' r='18' fill='%23FF8A00'/%3E%3Ccircle cx='70' cy='65' r='18' fill='%23FF8A00'/%3E%3C/svg%3E">
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="data.js"></script>

  <style>
    /* 1. 글로벌 스타일 */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080808; cursor: none; }

    #glcanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #cursor { position: fixed; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 99999; mix-blend-mode: difference; }

    /* 2. 메인 UI */
    #header { position: fixed; top: 2rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.3rem; z-index: 3; opacity: 0; animation: fadeIn .8s .3s forwards; text-align: center; width: 100%; }
    #datetime, #credit { color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.8); white-space: nowrap; font-family: 'Archivo', sans-serif; display: inline-block; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; }
    #datetime { font-size: 13px; font-weight: 700; }
    #credit { font-size: 10px; opacity: 0.6; }

    #footer { position: fixed; bottom: 3.5rem; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 1.2rem; z-index: 3; opacity: 0; animation: fadeIn .8s .6s forwards; }
    .btn { text-decoration: none; cursor: none; transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); width: 100%; text-align: center; }
    .btn span { display: inline-block; font-family: 'Rubik Iso', system-ui; font-size: 8.5vw; letter-spacing: -0.06em; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    .btn-primary { transform: rotate(-4deg); }
    .btn-primary:hover span { opacity: 0.6; transform: scale(1.1) rotate(-6deg); filter: blur(12px) brightness(2.5); text-shadow: 0 0 25px #fff; }
    .btn-secondary { transform: rotate(5deg); }
    .btn-secondary:hover span { opacity: 0.5; transform: scale(1.1) rotate(8deg); filter: blur(10px) brightness(0); }

    @media (min-width: 768px) { #datetime { font-size: 21px; } #credit { font-size: 16px; } #footer { gap: 3rem; bottom: 6rem; } .btn span { font-size: 52px; } }
    @keyframes fadeIn { to { opacity: 1; } }

    /* 3. 클래식 맥 팝업 (모바일 최적화) */
    .popup-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
      z-index: 10000; display: flex; justify-content: center; align-items: center;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .popup-overlay.active { opacity: 1; visibility: visible; pointer-events: auto; }

    .mac-note-popup {
      background: #fff; border: 3px solid #000; width: 95%; max-width: 750px; height: 85vh;
      display: flex; flex-direction: column; box-shadow: 10px 10px 0px #000;
      transform: translateY(110%);
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: auto;
    }
    .popup-overlay.active .mac-note-popup { transform: translateY(0); }

    .mac-note-header { background: #fff; border-bottom: 3px solid #000; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .mac-note-title { color: #000; font-family: 'Courier New', Courier, monospace; font-weight: bold; font-size: 0.75rem; letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mac-note-close { background: none; border: 2px solid #000; cursor: pointer; font-weight: bold; width: 28px; height: 28px; line-height: 24px; font-size: 1.1rem; }

    /* 모바일에서 여백 줄이기 */
    .mac-note-body {
      flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; /* 모바일용 좁은 패딩 */
      color: #000; text-align: left; line-height: 1.6; font-family: 'Courier New', Courier, monospace;
    }

    /* PC에서 넓은 여백 확보 */
    @media (min-width: 768px) {
      .mac-note-body { padding: 45px; }
      .mac-note-title { font-size: 0.85rem; }
    }

    .mac-note-body h1 { font-size: 1.2rem; background: #000; color: #fff; padding: 8px 12px; margin-bottom: 20px; display: inline-block; border: 2px solid #000; line-height: 1.2; max-width: 100%; }
    .mac-note-body h2 { font-size: 1.1rem; margin-top: 25px; border-bottom: 3px solid #000; padding-bottom: 5px; margin-bottom: 12px; }
    .mac-note-body p, .mac-note-body li { font-size: 13px; margin-bottom: 10px; word-break: keep-all; }
    .mac-note-body ul { margin-left: 18px; list-style-type: square; }
    
    /* 테이블 모바일 최적화 (가로 스크롤 허용) */
    .mac-note-body table { width: 100%; border-collapse: collapse; margin: 20px 0; border: 2px solid #000; font-size: 12px; }
    .mac-note-body th, .mac-note-body td { border: 1px solid #000; padding: 8px 4px; text-align: left; vertical-align: top; }
    .mac-note-body th { background: #eee; font-weight: bold; }

    .mac-note-footer { padding: 10px 15px; background: #fff; border-top: 1px solid #ddd; font-size: 9px; color: #000; text-align: right; font-family: 'Courier New', Courier, monospace; font-weight: bold; }

    .mac-note-body::-webkit-scrollbar { width: 10px; }
    .mac-note-body::-webkit-scrollbar-track { background: #fff; border-left: 2px solid #000; }
    .mac-note-body::-webkit-scrollbar-thumb { background: #000; border: 2px solid #fff; }
  </style>
</head>
<body>

<canvas id="glcanvas"></canvas>
<div id="cursor"></div>

<div id="header">
  <div id="datetime"></div>
  <div id="credit">Curated by Parsawoo</div>
</div>

<div id="footer">
  <a class="btn btn-primary" href="#" id="weeklyBtn"><span>Weekly Letter</span></a>
  <a class="btn btn-secondary" href="hourly.html"><span>Fortune Cookies</span></a>
</div>

<div id="weeklyPopup" class="popup-overlay">
  <div class="mac-note-popup">
    <div class="mac-note-header">
      <div class="mac-note-title">SYS.SCAN / FSO_REPORT</div>
      <button id="closePopup" class="mac-note-close">×</button>
    </div>
    <div class="mac-note-body" id="markdownContent">
      <p>BOOTING SYSTEM...</p>
    </div>
    <div class="mac-note-footer">LOG_2026 // SANGWOOK PARK</div>
  </div>
</div>

<script>
  let mx = window.innerWidth/2, my = window.innerHeight/2, smx = mx, smy = my;
  const cursorEl = document.getElementById('cursor');
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursorEl.style.left = mx+'px'; cursorEl.style.top = my+'px'; });
  const dtEl = document.getElementById('datetime');
  function updateTime() { const now = new Date(); dtEl.textContent = now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) + ' — ' + now.toLocaleTimeString('en-US', { hour12:false }); }
  setInterval(updateTime, 1000); updateTime();

  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl');
  const vsSource = `attribute vec2 a_pos; varying vec2 v_uv; void main() { v_uv = a_pos * 0.5 + 0.5; gl_Position = vec4(a_pos, 0.0, 1.0); }`;
  const fsSource = `precision mediump float; uniform sampler2D u_tex; uniform vec2 u_res; uniform vec2 u_imgRes; uniform vec2 u_mouse; uniform float u_time; varying vec2 v_uv; void main() { vec2 s = u_res; vec2 i = u_imgRes; float rs = s.x / s.y; float ri = i.x / i.y; vec2 newUv = rs < ri ? vec2(i.x * s.y / i.y, s.y) : vec2(s.x, i.y * s.x / i.x); vec2 offset = (newUv - s) / 2.0 / newUv; vec2 uv = v_uv * (s / newUv) + offset; uv.y = 1.0 - uv.y; float dist = distance(v_uv, vec2(u_mouse.x/u_res.x, 1.0 - u_mouse.y/u_res.y)); float ripple = sin(dist * 25.0 - u_time * 5.0) * exp(-dist * 6.0) * 0.015; vec2 dir = normalize(v_uv - vec2(u_mouse.x/u_res.x, 1.0 - u_mouse.y/u_res.y) + 0.0001); uv += dir * ripple; vec4 col = texture2D(u_tex, uv); gl_FragColor = vec4(col.rgb + vec3(abs(ripple) * 10.0 * exp(-dist * 8.0)), col.a); }`;
  function createShader(gl, type, src) { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; }
  const prog = gl.createProgram(); gl.attachShader(prog, createShader(gl, gl.VERTEX_SHADER, vsSource)); gl.attachShader(prog, createShader(gl, gl.FRAGMENT_SHADER, fsSource)); gl.linkProgram(prog); gl.useProgram(prog);
  const vertices = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]); gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer()); gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos'); gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  const uRes = gl.getUniformLocation(prog, 'u_res'), uImgRes = gl.getUniformLocation(prog, 'u_imgRes'), uMouse = gl.getUniformLocation(prog, 'u_mouse'), uTime = gl.getUniformLocation(prog, 'u_time');
  let imgRes = [1, 1];
  const tex = gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D, tex); gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([10,10,10,255]));
  function loadBg() { if (typeof IMAGES === 'undefined' || !IMAGES.length) return; const img = new Image(); img.crossOrigin = "anonymous"; img.onload = () => { imgRes = [img.width, img.height]; gl.bindTexture(gl.TEXTURE_2D, tex); gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR); }; img.src = IMAGES[Math.floor(Math.random() * IMAGES.length)]; }
  loadBg();

  const headerItems = [dtEl, document.getElementById('credit')];
  function updateHeaderRepulsion() {
    headerItems.forEach(item => {
      const rect = item.getBoundingClientRect();
      const itemX = rect.left + rect.width / 2, itemY = rect.top + rect.height / 2;
      const dx = mx - itemX, dy = my - itemY, dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200) { let force = Math.pow((200 - dist) / 200, 1.5); item.style.transform = `translate(${-dx * force * 100 / dist}px, ${-dy * force * 60 / dist}px) scale(${1 - force * 0.15})`; }
      else { item.style.transform = `translate(0,0) scale(1)`; }
    });
  }

  const weeklyBtn = document.getElementById('weeklyBtn');
  const popup = document.getElementById('weeklyPopup');
  const closeBtn = document.getElementById('closePopup');
  const content = document.getElementById('markdownContent');

  weeklyBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const filePath = 'weekly-letter/2026-03-03.md'; 
    fetch(filePath)
      .then(res => { if (!res.ok) throw new Error(`NOT FOUND: ${filePath}`); return res.text(); })
      .then(data => {
        content.innerHTML = (typeof marked !== 'undefined') ? marked.parse(data) : `<pre>${data}</pre>`;
        popup.classList.add('active');
        if (window.innerWidth > 768) cursorEl.style.mixBlendMode = 'normal';
      })
      .catch(err => {
        content.innerHTML = `<div style="color:red; font-size:12px; padding:20px;">[ERROR]: ${err.message}</div>`;
        popup.classList.add('active');
      });
  });

  closeBtn.addEventListener('click', () => {
    popup.classList.remove('active');
    cursorEl.style.mixBlendMode = 'difference';
  });

  function render(t) {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    smx += (mx - smx) * 0.1; smy += (my - smy) * 0.1;
    gl.uniform2f(uRes, canvas.width, canvas.height); gl.uniform2f(uImgRes, imgRes[0], imgRes[1]); gl.uniform2f(uMouse, smx, smy); gl.uniform1f(uTime, t * 0.001);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); updateHeaderRepulsion(); requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
</script>
</body>
</html>
