<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARSAWOO</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Fredoka+One&family=Righteous&family=Lilita+One&family=Titan+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #efefea;
      cursor: none;
    }
    #cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: #000;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 999;
    }
    canvas { position: fixed; inset: 0; }
    #bg { z-index: 0; }
    #ov { z-index: 2; pointer-events: none; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="cursor"></div>
<canvas id="ov"></canvas>

<script>
  const CHARS  = ['P','A','R','S','A','W','O','O'];
  const FONTS  = [
    'Lilita One',
    'Titan One',
    'Fredoka One',
    'Righteous',
    'Boogaloo',
  ];
  const SIZES  = [150, 170, 185, 200, 160];

  const FLEE_R = 220;
  const FLEE_F = 32;
  const RETURN = 0.055;
  const DAMP   = 0.72;
  const GAP_X  = 210;
  const GAP_Y  = 210;

  let W = window.innerWidth;
  let H = window.innerHeight;
  let mx = -999, my = -999;

  const bgC = document.getElementById('bg');
  const ovC = document.getElementById('ov');
  const bgX = bgC.getContext('2d');
  const ovX = ovC.getContext('2d');
  bgC.width = ovC.width  = W;
  bgC.height = ovC.height = H;

  const cursorEl = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my + 'px';
  });

  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  let items = [];

  function buildGrid() {
    items = [];
    const cols = Math.ceil(W / GAP_X) + 1;
    const rows = Math.ceil(H / GAP_Y) + 1;
    let idx = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const font = pick(FONTS);
        const size = pick(SIZES);
        const ox   = c * GAP_X + (r % 2 === 0 ? 0 : GAP_X * 0.5);
        const oy   = r * GAP_Y + size * 0.85;
        items.push({
          char: CHARS[idx % CHARS.length],
          font, size,
          ox, oy,
          x: ox, y: oy,
          vx: 0, vy: 0,
        });
        idx++;
      }
    }
  }

  function fontsReady() {
    return Promise.all(
      FONTS.map(f => document.fonts.load(`900 60px '${f}'`))
    );
  }

  function drawDark() {
    ovX.clearRect(0, 0, W, H);
    const g = ovX.createRadialGradient(mx, my, 0, mx, my, 350);
    g.addColorStop(0,    'rgba(8,8,8,0)');
    g.addColorStop(0.30, 'rgba(8,8,8,0)');
    g.addColorStop(0.62, 'rgba(8,8,8,0.78)');
    g.addColorStop(1,    'rgba(8,8,8,0.97)');
    ovX.fillStyle = g;
    ovX.fillRect(0, 0, W, H);
  }

  function tick() {
    bgX.clearRect(0, 0, W, H);

    items.forEach(l => {
      const dx   = l.x - mx;
      const dy   = l.y - my;
      const dist = Math.hypot(dx, dy);

      if (dist < FLEE_R && dist > 0.5) {
        const force = Math.pow(1 - dist / FLEE_R, 1.8) * FLEE_F;
        const angle = Math.atan2(dy, dx);
        l.vx += Math.cos(angle) * force;
        l.vy += Math.sin(angle) * force;
      }

      l.vx += (l.ox - l.x) * RETURN;
      l.vy += (l.oy - l.y) * RETURN;
      l.vx *= DAMP;
      l.vy *= DAMP;
      l.x  += l.vx;
      l.y  += l.vy;

      const speed = Math.hypot(l.vx, l.vy);
      const alpha = Math.max(0.1, Math.min(1, 1 - speed * 0.035));

      bgX.save();
      bgX.globalAlpha = alpha;
      bgX.font = `${l.size}px '${l.font}', sans-serif`;
      bgX.fillStyle = '#111';
      bgX.textBaseline = 'alphabetic';
      bgX.translate(l.x, l.y);
      bgX.rotate(l.vx * 0.035);
      bgX.fillText(l.char, 0, 0);
      bgX.restore();
    });

    drawDark();
    requestAnimationFrame(tick);
  }

  fontsReady().then(() => {
    buildGrid();
    tick();
  });

  window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    bgC.width = ovC.width  = W;
    bgC.height = ovC.height = H;
    buildGrid();
  });
</script>
</body>
</html>
