<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parsawoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Iso&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700&family=Rubik+Iso&display=swap" rel="stylesheet">
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #080808;
      cursor: none;
    }

    /* ── WebGL 캔버스 (배경 + 왜곡) ── */
    #glcanvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    #cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 999;
      mix-blend-mode: difference;
    }

   /* ── 상단 ── */
#header {
  position: fixed;
  top: 2.5rem; /* 위치를 아주 조금 내림 */
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
  z-index: 3;
  opacity: 0;
  animation: fadeIn .8s .3s forwards;
  mix-blend-mode: difference;
}

#datetime {
  font-family: 'Archivo', sans-serif;
  font-size: 14px;      /* 크기 약간 키움 */
  font-weight: 700;     /* 굵게 */
  letter-spacing: -0.02em; /* 자간을 좁게 설정 */
  color: rgba(255,255,255,0.9); /* 불투명도를 높여 더 선명하게 */
  white-space: nowrap;
}

#credit {
  font-family: 'Archivo', sans-serif;
  font-size: 11px;
  font-weight: 500;     /* Medium 두께 */
  letter-spacing: -0.01em;
  color: rgba(255,255,255,0.5);
  white-space: nowrap;
  /* text-transform: uppercase; 를 삭제하여 소문자 허용 */
}

    /* ── 하단 버튼 영역 ── */
    #footer {
      position: fixed;
      bottom: 4.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.2rem;
      z-index: 3;
      opacity: 0;
      animation: fadeIn .8s .6s forwards;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      cursor: none;
      /* 부드러운 각도 복귀를 위한 트랜지션 */
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .btn span {
      display: block;
      font-family: 'Rubik Iso', system-ui;
      font-size: 34px; /* 조금 더 시원하게 키움 */
      letter-spacing: -0.08em;
      color: #fff;
      /* 기본 상태 그림자: 물 위에 떠 있는 입체감 */
      text-shadow: 0 8px 15px rgba(0,0,0,0.6);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── Weekly Letter (하얀색 안개로 남음) ── */
    .btn-primary {
      transform: rotate(-4deg);
    }
    .btn-primary:hover span {
      /* 완전히 사라지지 않고 하얀 가우시안 블러 잔상으로 남음 */
      opacity: 0.5; 
      transform: scale(1.2) rotate(-6deg);
      filter: blur(12px) brightness(2); /* 하얗게 번짐 */
      text-shadow: 0 0 20px #fff; /* 하얀 광채 추가 */
    }

    /* ── Hourly Report (검은색 안개로 남음) ── */
    .btn-secondary {
      transform: rotate(5deg);
    }
    .btn-secondary:hover span {
      /* 완전히 사라지지 않고 검은 가우시안 블러 잔상으로 남음 */
      opacity: 0.4;
      transform: scale(1.2) rotate(8deg);
      filter: blur(10px) brightness(0); /* 검게 타버린 잔상 */
      text-shadow: none;
    }

    /* 버튼 클릭 시 피드백 (선택 사항) */
    .btn:active {
      transform: scale(0.95);
    }

    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

<canvas id="glcanvas"></canvas>
<div id="cursor"></div>

<div id="header">
  <div id="datetime"></div>
  <div id="credit">Curated by Parsawoo</div>
</div>

<div id="footer">
  <a class="btn btn-primary" href="latest.html"><span>Weekly Letter</span></a>
  <a class="btn btn-secondary" href="hourly.html"><span>Hourly Report</span></a>
</div>
  
<script>
  /* ── 커서 ── */
  let mx = window.innerWidth / 2;
  let my = window.innerHeight / 2;
  const cursorEl = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursorEl.style.left = mx + 'px';
    cursorEl.style.top  = my + 'px';
  });

  /* ── 시간 ── */
  const dtEl = document.getElementById('datetime');
  function updateTime() {
    const now  = new Date();
    const date = now.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
    const time = now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    dtEl.textContent = `${date}  —  ${time}`;
  }
  setInterval(updateTime, 1000);
  updateTime();

  /* ── WebGL ripple ── */
  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  const vsSource = `
    attribute vec2 a_pos;
    varying vec2 v_uv;
    void main() {
      v_uv = a_pos * 0.5 + 0.5;
      gl_Position = vec4(a_pos, 0.0, 1.0);
    }
  `;

  const fsSource = `
    precision mediump float;
    uniform sampler2D u_tex;
    uniform vec2 u_res;
    uniform vec2 u_mouse;
    uniform float u_time;
    varying vec2 v_uv;

    void main() {
      vec2 uv = v_uv;
      uv.y = 1.0 - uv.y;

      vec2 mouse = vec2(u_mouse.x / u_res.x, u_mouse.y / u_res.y);
      float dist = distance(uv, mouse);

      // 1. 물결 계산
      float ripple = sin(dist * 28.0 - u_time * 5.0)
                     * exp(-dist * 7.0)
                     * 0.018;

      vec2 dir = normalize(uv - mouse + vec2(0.0001));
      uv += dir * ripple;

      // 2. 기본 색상 가져오기
      vec4 texColor = texture2D(u_tex, uv);

      // 3. 블리칭(하얗게 날아가는) 효과 추가
      // 물결의 굴곡(ripple)이 심한 곳일수록 더 하얗게 만듭니다.
      float bleach = abs(ripple) * 12.0; 
      
      // 마우스와 아주 가까운 곳에만 효과가 집중되도록 감쇄 적용
      bleach *= exp(-dist * 10.0);

      // 최종 색상 = 원래색 + 흰색 광도
      gl_FragColor = vec4(texColor.rgb + vec3(bleach), texColor.a);
    }
  `;

  function compileShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, compileShader(vsSource, gl.VERTEX_SHADER));
  gl.attachShader(prog, compileShader(fsSource, gl.FRAGMENT_SHADER));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const quad = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);
  const buf  = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);

  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uTex   = gl.getUniformLocation(prog, 'u_tex');
  const uRes   = gl.getUniformLocation(prog, 'u_res');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');
  const uTime  = gl.getUniformLocation(prog, 'u_time');

  /* 배경 텍스처 로드 */
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);

  // 이미지 로드 전 임시 1px
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0,
    gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([10,10,10,255]));

  function loadBg() {
    if (typeof IMAGES === 'undefined' || IMAGES.length === 0) return;
    const src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    };
    img.src = src;
  }
  loadBg();

  /* 마우스 스무딩 */
  let smx = mx, smy = my;

  function draw(t) {
    smx += (mx - smx) * 0.08;
    smy += (my - smy) * 0.08;

    gl.uniform2f(uRes,   canvas.width, canvas.height);
    gl.uniform2f(uMouse, smx, smy);
    gl.uniform1f(uTime,  t * 0.001);
    gl.uniform1i(uTex,   0);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
</script>
</body>
</html>
