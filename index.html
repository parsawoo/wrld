<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR S W</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #ff3c2f;
      --muted: #3a3a3a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    /* ── 커스텀 커서 ── */
    #cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .2s, height .2s, background .2s;
    }
    #cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(240,237,230,.35);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width .35s cubic-bezier(.23,1,.32,1),
                  height .35s cubic-bezier(.23,1,.32,1),
                  border-color .35s;
    }
    body.hovering #cursor        { width: 6px; height: 6px; background: var(--fg); }
    body.hovering #cursor-ring   { width: 56px; height: 56px; border-color: var(--accent); }

    /* ── 노이즈 오버레이 ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .04;
      pointer-events: none;
      z-index: 100;
    }

    /* ── 레이아웃 ── */
    .scene {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 8vw;
    }

    /* ── 배경 큰 글자 ── */
    .bg-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(120px, 22vw, 320px);
      color: transparent;
      -webkit-text-stroke: 1px rgba(240,237,230,.04);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      letter-spacing: 0.02em;
    }

    /* ── 상단 라벨 ── */
    .label {
      font-size: 11px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp .8s .2s forwards;
    }

    /* ── 메인 타이틀 ── */
    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 10vw, 130px);
      line-height: .92;
      letter-spacing: .01em;
      overflow: hidden;
    }
    .title-line {
      display: block;
      opacity: 0;
      transform: translateY(60px);
      animation: slideUp .7s cubic-bezier(.23,1,.32,1) forwards;
    }
    .title-line:nth-child(1) { animation-delay: .3s; }
    .title-line:nth-child(2) { animation-delay: .45s; color: var(--accent); }
    .title-line:nth-child(3) { animation-delay: .6s; }

    /* ── 서브 텍스트 ── */
    .sub {
      margin-top: 2.5rem;
      font-size: clamp(13px, 1.4vw, 16px);
      font-weight: 300;
      color: rgba(240,237,230,.45);
      letter-spacing: .04em;
      max-width: 420px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp .8s .9s forwards;
    }

    /* ── CTA 버튼 ── */
    .cta {
      margin-top: 3rem;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--fg);
      text-decoration: none;
      opacity: 0;
      animation: fadeUp .8s 1.1s forwards;
      position: relative;
    }
    .cta::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width .4s cubic-bezier(.23,1,.32,1);
    }
    .cta:hover::after { width: 100%; }
    .cta-arrow {
      width: 32px; height: 1px;
      background: var(--accent);
      position: relative;
      transition: width .4s cubic-bezier(.23,1,.32,1);
    }
    .cta-arrow::after {
      content: '';
      position: absolute;
      right: 0; top: -3px;
      width: 6px; height: 6px;
      border-right: 1px solid var(--accent);
      border-top: 1px solid var(--accent);
      transform: rotate(45deg);
    }
    .cta:hover .cta-arrow { width: 52px; }

    /* ── 하단 상태바 ── */
    .statusbar {
      position: fixed;
      bottom: 2rem;
      left: 8vw; right: 8vw;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(240,237,230,.2);
      opacity: 0;
      animation: fadeUp .8s 1.3s forwards;
    }

    /* ── 호버 카드들 ── */
    .cards {
      position: fixed;
      top: 50%; right: 8vw;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      animation: fadeUp .8s 1.5s forwards;
    }
    .card {
      width: 160px;
      padding: 14px 16px;
      border: 1px solid var(--muted);
      background: rgba(10,10,10,.6);
      backdrop-filter: blur(8px);
      transition: border-color .3s, transform .3s cubic-bezier(.23,1,.32,1);
      cursor: none;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateX(-6px);
    }
    .card-num {
      font-size: 10px;
      letter-spacing: .15em;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: .05em;
      color: var(--fg);
    }
    .card-sub {
      font-size: 10px;
      color: rgba(240,237,230,.3);
      margin-top: 4px;
      letter-spacing: .08em;
    }

    /* ── 마우스 팔로우 spotlight ── */
    #spotlight {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,60,47,.06) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: opacity .3s;
    }

    /* ── 애니메이션 ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div id="spotlight"></div>

  <div class="scene">
    <div class="bg-text">CREATIVE</div>

    <span class="label">Entertainment &amp; Creative</span>

    <h1 class="title">
      <span class="title-line">YOUR</span>
      <span class="title-line">NAME</span>
      <span class="title-line">HERE</span>
    </h1>

    <p class="sub">
      크리에이티브 디렉터 · 프로덕션 디자이너<br>
      엔터테인먼트 업계에서 비주얼로 말합니다.
    </p>

    <a class="cta" href="#">
      <span class="cta-arrow"></span>
      View Work
    </a>
  </div>

  <!-- 우측 카드 -->
  <div class="cards">
    <div class="card">
      <div class="card-num">01</div>
      <div class="card-title">Projects</div>
      <div class="card-sub">Selected works</div>
    </div>
    <div class="card">
      <div class="card-num">02</div>
      <div class="card-title">About</div>
      <div class="card-sub">Who I am</div>
    </div>
    <div class="card">
      <div class="card-num">03</div>
      <div class="card-title">Contact</div>
      <div class="card-sub">Let's talk</div>
    </div>
  </div>

  <!-- 하단 상태바 -->
  <div class="statusbar">
    <span>Seoul, KR</span>
    <span id="clock"></span>
    <span>Available for work</span>
  </div>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    const spotlight = document.getElementById('spotlight');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
      spotlight.style.left = mx + 'px';
      spotlight.style.top  = my + 'px';
    });

    (function loopRing() {
      rx += (mx - rx) * .12;
      ry += (my - ry) * .12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(loopRing);
    })();

    document.querySelectorAll('.card, .cta').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
