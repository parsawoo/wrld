<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Letter | A2O Future Strategy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark-mode"> <nav style="padding: 20px;">
        <a href="index.html" style="color: #00ffcc; text-decoration: none;">← Back to Home</a>
    </nav>

    <main id="content" class="weekly-content" style="max-width: 800px; margin: 0 auto; padding: 40px 20px; color: #fff;">
        <div id="loading">리포트를 불러오는 중입니다...</div>
    </main>

    <script>
        // 1. 파일명 확인 (파일명이 2026-03-03.md 인지 2026-03-30.md 인지 확인 필수!)
        const targetFile = '2026-03-03.md'; 
        
        // 2. Fetch API로 파일 가져오기
        // ./weekly-letter/ 경로가 맞는지 확인하세요.
        fetch(`./weekly-letter/${targetFile}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('파일을 찾을 수 없습니다: ' + response.statusText);
                }
                return response.text();
            })
            .then(markdown => {
                // 로딩 메시지 삭제 후 마크다운 변환 및 삽입
                const contentArea = document.getElementById('content');
                contentArea.innerHTML = marked.parse(markdown);
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center; margin-top: 50px;">
                        <p>리포트를 불러오는 데 실패했습니다.</p>
                        <p style="font-size: 0.8rem; color: #888;">사유: ${error.message}</p>
                    </div>`;
            });
    </script>
</body>
</html>
